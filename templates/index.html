<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Detector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 bg-[conic-gradient(at_top_right,_var(--tw-gradient-stops))] from-slate-900 via-purple-900 to-slate-900">
    <div class="max-w-4xl w-full flex flex-col items-center">
        <div class="text-center mb-10">
            <h1 class="text-4xl md:text-6xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-purple-400 mb-4">
                Emotion Detector
            </h1>
            <p class="text-slate-400 text-lg">Real-time web facial expression analysis</p>
        </div>

        <div class="relative rounded-3xl overflow-hidden shadow-2xl shadow-purple-900/50 glass p-3 ring-1 ring-white/10">
            <!-- Video for capturing webcam -->
            <video id="video" width="640" height="480" autoplay playsinline class="rounded-2xl block object-cover"></video>
            <!-- Canvas for drawing boxes -->
            <canvas id="canvas" width="640" height="480" class="absolute top-3 left-3 pointer-events-none rounded-2xl"></canvas>
            
            <!-- Hidden Canvas for extracting images to send to server -->
            <canvas id="hidden-canvas" width="640" height="480" class="hidden"></canvas>
        </div>

        <div class="mt-8 flex gap-4">
            <button id="start-btn" class="px-8 py-3 bg-gradient-to-r from-cyan-500 to-blue-500 hover:from-cyan-400 hover:to-blue-400 font-semibold rounded-full transition-all shadow-lg shadow-cyan-500/30 transform hover:scale-105 text-white">
                Start Camera
            </button>
            <button id="stop-btn" class="px-8 py-3 bg-slate-700/50 hover:bg-slate-600/50 ring-1 ring-white/10 font-semibold rounded-full transition-all hidden text-white">
                Stop
            </button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const hiddenCanvas = document.getElementById('hidden-canvas');
        const ctx = canvas.getContext('2d');
        const hiddenCtx = hiddenCanvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        
        // Mirror the UI so it acts like a mirror
        video.style.transform = 'scaleX(-1)';
        
        let stream = null;
        let isProcessing = false;
        let intervalId = null;

        startBtn.addEventListener('click', async () => {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 640, height: 480, facingMode: "user" } 
                });
                video.srcObject = stream;
                
                startBtn.classList.add('hidden');
                stopBtn.classList.remove('hidden');

                // Wait for video to load metadata, then start API polling
                video.onloadedmetadata = () => {
                    video.play();
                    // Process frames every 300ms 
                    intervalId = setInterval(processFrame, 300);
                };
            } catch (err) {
                console.error("Error accessing webcam:", err);
                alert("Could not access webcam. Please allow permissions in your browser.");
            }
        });

        stopBtn.addEventListener('click', () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
            }
            clearInterval(intervalId);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            startBtn.classList.remove('hidden');
            stopBtn.classList.add('hidden');
        });

        async function processFrame() {
            if (isProcessing || !stream || video.videoWidth === 0) return;
            isProcessing = true;

            // Draw current video frame to hidden canvas
            hiddenCtx.drawImage(video, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
            
            // Convert to base64 jpeg
            const dataUrl = hiddenCanvas.toDataURL('image/jpeg', 0.8);

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: dataUrl })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    drawResults(data.predictions);
                }
            } catch (err) {
                console.error("Error fetching predictions:", err);
            } finally {
                isProcessing = false;
            }
        }

        function drawResults(predictions) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (!predictions || predictions.length === 0) {
               return; 
            }

            predictions.forEach(p => {
                const [x, y, w, h] = p.box;
                const emotion = p.emotion;

                // Because video is mirrored using CSS (transform: scaleX(-1)), 
                // we must mirror the X coordinate when drawing on the canvas so boxes align perfectly.
                const mirroredX = canvas.width - x - w;

                // Box
                ctx.strokeStyle = '#06b6d4'; // Cyan 500
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.roundRect(mirroredX, y, w, h, 12);
                ctx.stroke();

                // Draw background for text label
                ctx.fillStyle = '#06b6d4';
                ctx.font = 'bold 20px Inter, sans-serif';
                const textWidth = ctx.measureText(emotion).width;
                ctx.beginPath();
                ctx.roundRect(mirroredX, Math.max(0, y - 35), textWidth + 20, 30, 6);
                ctx.fill();

                // Draw text
                ctx.fillStyle = '#ffffff';
                ctx.fillText(emotion, mirroredX + 10, Math.max(22, y - 13));
            });
        }
    </script>
</body>
</html>
